<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Story — A Map of Us</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #c0637a;
    --gold-light: #e8b4c0;
    --gold-dim: rgba(192,99,122,0.18);
    --ink: #1a0f14;
    --parchment: #fdf0f3;
    --cream: #fdf6f8;
    --modal-bg: rgba(18,8,12,0.92);

    --pin-been:  #5ba4cf;   /* carolina blue   — places we've been   */
    --pin-visit: #7dab6e;   /* matcha green    — want to visit        */
    --pin-live:  #c4a882;   /* warm light brown — want to live        */
  }

  html, body {
    height: 100%;
    background: var(--ink);
    font-family: 'EB Garamond', serif;
    color: var(--parchment);
    overflow: hidden;
  }

  /* ── HEADER ── */
  #header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 1000;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 18px 24px 14px;
    background: linear-gradient(to bottom, rgba(18,8,12,0.97) 60%, transparent);
    pointer-events: none;
  }
  #header .eyebrow {
    font-family: 'Cormorant Garamond', serif;
    font-size: 10px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.8;
    margin-bottom: 4px;
  }
  #header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(22px, 4vw, 36px);
    letter-spacing: 0.06em;
    color: var(--parchment);
    line-height: 1;
  }
  #header h1 em {
    font-style: italic;
    color: var(--gold-light);
  }
  #header .subtitle {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 13px;
    color: rgba(173, 216, 230, 1);
    margin-top: 5px;
    letter-spacing: 0.02em;
  }

  /* ── MAP ── */
  #map {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    filter: saturate(1.1) brightness(1.0);
    transition: filter 0.4s ease;
  }

  /* Custom tile layer — dark nautical feel via Leaflet */
  .leaflet-container {
    background: #0d0c0a;
  }

  /* ── PIN STYLES ── */
  .memory-pin {
    position: relative;
    cursor: pointer;
    transition: transform 0.2s ease;
  }
  .memory-pin:hover { transform: scale(1.18); }

  .pin-outer {
    width: 28px;
    height: 28px;
    border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg);
    background: var(--pin-color);
    border: 2.5px solid rgba(255,255,255,0.55);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 0 3px rgba(0,0,0,0.15), 0 4px 14px rgba(0,0,0,0.45);
    transition: filter 0.2s, box-shadow 0.2s;
  }
  .memory-pin:hover .pin-outer {
    filter: brightness(1.15);
    box-shadow: 0 0 0 5px rgba(0,0,0,0.12), 0 6px 20px rgba(0,0,0,0.5);
  }
  .pin-inner {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: rgba(255,255,255,0.75);
    transform: rotate(45deg);
  }

  /* ── LEGEND ── */
  #legend {
    position: fixed;
    top: 90px; right: 18px;
    z-index: 1000;
    background: rgba(26,15,20,0.82);
    border: 1px solid rgba(192,99,122,0.18);
    border-radius: 10px;
    backdrop-filter: blur(10px);
    padding: 13px 16px 14px;
    display: flex;
    flex-direction: column;
    gap: 9px;
    min-width: 170px;
  }
  #legend .legend-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 9px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: rgba(253,240,243,0.38);
    margin-bottom: 2px;
  }
  .legend-row {
    display: flex;
    align-items: center;
    gap: 9px;
  }
  .legend-pin {
    width: 14px;
    height: 14px;
    border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg);
    border: 2px solid rgba(255,255,255,0.5);
    flex-shrink: 0;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
  }
  .legend-pin.been  { background: var(--pin-been); }
  .legend-pin.visit { background: var(--pin-visit); }
  .legend-pin.live  { background: var(--pin-live); }
  .legend-label {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 13.5px;
    color: rgba(253,240,243,0.7);
    line-height: 1;
  }

  /* ── MODAL ── */
  #modal-overlay {
    position: fixed;
    inset: 0;
    z-index: 2000;
    background: var(--modal-bg);
    backdrop-filter: blur(6px);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s ease;
    padding: 24px;
  }
  #modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  #modal {
    position: relative;
    max-width: 560px;
    width: 100%;
    background: #141210;
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: 2px;
    overflow: hidden;
    max-height: 90vh;
    display: flex;
    flex-direction: column;
    transform: translateY(18px) scale(0.97);
    transition: transform 0.35s cubic-bezier(0.22,1,0.36,1);
    box-shadow: 0 32px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(201,168,76,0.08);
  }
  #modal-overlay.open #modal {
    transform: translateY(0) scale(1);
  }

  #modal-img-wrap {
    width: 100%;
    max-height: 420px;
    min-height: 200px;
    overflow: hidden;
    position: relative;
    background: #0a0908;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #modal-img-wrap::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 60px;
    background: linear-gradient(transparent, #141210);
    pointer-events: none;
    z-index: 1;
  }

  /* slideshow track */
  #slide-track {
    display: flex;
    width: 100%;
    height: 100%;
    min-height: 200px;
    max-height: 420px;
    transition: transform 0.45s cubic-bezier(0.22,1,0.36,1);
  }
  .slide-img {
    min-width: 100%;
    width: 100%;
    max-height: 420px;
    object-fit: contain;   /* show full photo, no cropping */
    background: #0a0908;
  }

  /* arrows */
  .slide-arrow {
    position: absolute;
    top: 50%; transform: translateY(-50%);
    z-index: 2;
    width: 34px; height: 34px;
    background: rgba(20,18,16,0.65);
    border: 1px solid rgba(253,240,243,0.18);
    border-radius: 50%;
    color: rgba(253,240,243,0.8);
    font-size: 15px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, border-color 0.2s;
    line-height: 1;
  }
  .slide-arrow:hover {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--ink);
  }
  .slide-arrow.hidden { display: none; }
  #slide-prev { left: 10px; }
  #slide-next { right: 10px; }

  /* dot indicators */
  #slide-dots {
    position: absolute;
    bottom: 10px; left: 50%;
    transform: translateX(-50%);
    z-index: 2;
    display: flex;
    gap: 5px;
  }
  .slide-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: rgba(253,240,243,0.35);
    transition: background 0.2s, transform 0.2s;
    cursor: pointer;
  }
  .slide-dot.active {
    background: var(--gold-light);
    transform: scale(1.3);
  }

  /* placeholder when no images */
  #modal-img-placeholder {
    display: none;
    width: 100%;
    height: 100%;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 8px;
    color: rgba(192,99,122,0.3);
  }
  #modal-img-placeholder svg { opacity: 0.5; }
  #modal-img-placeholder span {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  #modal-body {
    padding: 24px 32px 32px;
    overflow-y: auto;
    flex: 1;
    scrollbar-width: thin;
    scrollbar-color: rgba(192,99,122,0.3) transparent;
  }
  #modal-body::-webkit-scrollbar { width: 4px; }
  #modal-body::-webkit-scrollbar-track { background: transparent; }
  #modal-body::-webkit-scrollbar-thumb { background: rgba(192,99,122,0.3); border-radius: 2px; }

  .modal-location-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 10px;
  }
  .modal-location-tag::before {
    content: '';
    display: inline-block;
    width: 20px;
    height: 1px;
    background: var(--gold);
    opacity: 0.6;
  }

  #modal-title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(22px, 4vw, 30px);
    line-height: 1.1;
    color: var(--parchment);
    margin-bottom: 6px;
  }
  #modal-date {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 13px;
    color: rgba(245,240,232,0.4);
    margin-bottom: 18px;
  }
  #modal-text {
    font-family: 'EB Garamond', serif;
    font-size: 15.5px;
    line-height: 1.75;
    color: rgba(245,240,232,0.72);
  }

  .modal-divider {
    width: 40px;
    height: 1px;
    background: var(--gold);
    opacity: 0.35;
    margin: 18px 0;
  }

  #modal-close {
    position: absolute;
    top: 14px; right: 16px;
    width: 32px; height: 32px;
    background: rgba(10,9,8,0.7);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: rgba(245,240,232,0.55);
    font-size: 16px;
    transition: background 0.2s, color 0.2s, border-color 0.2s;
    z-index: 10;
    line-height: 1;
  }
  #modal-close:hover {
    background: var(--gold);
    color: var(--ink);
    border-color: var(--gold);
  }

  /* ── COUNTER ── */
  #counter {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%);
    z-index: 1000;
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(10,9,8,0.8);
    border: 1px solid rgba(201,168,76,0.2);
    padding: 9px 20px;
    border-radius: 40px;
    backdrop-filter: blur(8px);
    pointer-events: none;
  }
  #counter .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--gold);
    opacity: 0.7;
  }
  #counter span {
    font-family: 'Cormorant Garamond', serif;
    font-size: 12px;
    letter-spacing: 0.18em;
    color: rgba(245,240,232,0.55);
    text-transform: uppercase;
  }
  #counter strong {
    font-weight: 400;
    color: var(--gold-light);
  }

  /* ── LEAFLET OVERRIDES ── */
  .leaflet-control-zoom {
    border: 1px solid rgba(201,168,76,0.2) !important;
    border-radius: 2px !important;
    overflow: hidden;
  }
  .leaflet-control-zoom a {
    background: rgba(10,9,8,0.85) !important;
    color: var(--gold-light) !important;
    border-bottom: 1px solid rgba(201,168,76,0.15) !important;
    font-size: 16px !important;
  }
  .leaflet-control-zoom a:hover {
    background: rgba(201,168,76,0.15) !important;
  }
  .leaflet-control-attribution {
    background: rgba(10,9,8,0.6) !important;
    color: rgba(245,240,232,0.25) !important;
    font-size: 9px !important;
  }
  .leaflet-control-attribution a { color: rgba(201,168,76,0.4) !important; }
</style>
</head>

<div id="header">
  <div class="eyebrow">Happy Two Years Baby!</div>
  <h1>Our Love, <em>Mapped</em></h1>
  <div class="subtitle">I will always cherish the places we go; that's why I decided to give 'em some pins!</div>
</div>

<div id="map"></div>

<!-- LEGEND -->
<div id="legend">
  <div class="legend-title">Our Map</div>

    <div class="legend-pin been"></div>
    <span class="legend-label">Places we've been</span>
  </div>
  <div class="legend-row">

  </div>
  <div class="legend-row">
    <div class="legend-pin live"></div>
    <span class="legend-label">Want to live one day</span>
  </div>
</div>

</div> -->

<!-- MODAL -->
<div id="modal-overlay">
  <div id="modal">
    <button id="modal-close" aria-label="Close">✕</button>
    <div id="modal-img-wrap">
      <div id="slide-track"></div>
      <button class="slide-arrow hidden" id="slide-prev">&#8592;</button>
      <button class="slide-arrow hidden" id="slide-next">&#8594;</button>
      <div id="slide-dots"></div>
      <div id="modal-img-placeholder">

    <div id="modal-body">

      <div id="modal-date"></div>
      <div class="modal-divider"></div>
      <p id="modal-text"></p>
    </div>
  </div>
</div>

// ── Init Map ──
const map = L.map('map', {
  center: [20, 10],
  zoom: 2.5,
  zoomControl: true,
  minZoom: 2,
  maxZoom: 16,
  worldCopyJump: true
});

L.tileLayer('https://tiles.stadiamaps.com/tiles/alidade_smooth/{z}/{x}/{y}{r}.png?language=en', {
  attribution: '© Stadia Maps © OpenMapTiles © OpenStreetMap contributors',
  maxZoom: 20
}).addTo(map);

// ── Modal + Slideshow logic ──
const overlay        = document.getElementById('modal-overlay');
const slideTrack     = document.getElementById('slide-track');
const slidePrev      = document.getElementById('slide-prev');
const slideNext      = document.getElementById('slide-next');
const slideDotsWrap  = document.getElementById('slide-dots');
const placeholder    = document.getElementById('modal-img-placeholder');

let currentSlide = 0;
let totalSlides  = 0;

function goToSlide(n) {
  currentSlide = Math.max(0, Math.min(n, totalSlides - 1));
  slideTrack.style.transform = `translateX(-${currentSlide * 100}%)`;
  slidePrev.classList.toggle('hidden', currentSlide === 0);
  slideNext.classList.toggle('hidden', currentSlide === totalSlides - 1);
  slideDotsWrap.querySelectorAll('.slide-dot').forEach((d, i) =>
    d.classList.toggle('active', i === currentSlide)
  );
}

function openModal(memory) {
  document.getElementById('modal-location').textContent = memory.city;
  document.getElementById('modal-title').textContent    = memory.title;
  document.getElementById('modal-date').textContent     = memory.date;
  document.getElementById('modal-text').textContent     = memory.text;

  // normalise: accept single string OR array
  const photos = Array.isArray(memory.photos)
    ? memory.photos.filter(Boolean)
    : (memory.photo ? [memory.photo] : []);

  // clear previous
  slideTrack.innerHTML = '';
  slideDotsWrap.innerHTML = '';
  currentSlide = 0;
  totalSlides  = photos.length;

  if (photos.length > 0) {
    placeholder.style.display = 'none';
    slideTrack.style.display  = 'flex';

    photos.forEach((src, i) => {
      const img = document.createElement('img');
      img.src = src;
      img.className = 'slide-img';
      img.alt = `${memory.title} — photo ${i + 1}`;
      slideTrack.appendChild(img);

      if (photos.length > 1) {
        const dot = document.createElement('div');
        dot.className = 'slide-dot' + (i === 0 ? ' active' : '');
        dot.addEventListener('click', () => goToSlide(i));
        slideDotsWrap.appendChild(dot);
      }
    });

    slidePrev.classList.toggle('hidden', photos.length <= 1);
    slideNext.classList.add('hidden'); // start at first
    goToSlide(0);
  } else {
    slideTrack.style.display  = 'none';
    placeholder.style.display = 'flex';
    slidePrev.classList.add('hidden');
    slideNext.classList.add('hidden');
  }

  overlay.classList.add('open');
}

function closeModal() { overlay.classList.remove('open'); }

slidePrev.addEventListener('click', () => goToSlide(currentSlide - 1));
slideNext.addEventListener('click', () => goToSlide(currentSlide + 1));
document.getElementById('modal-close').addEventListener('click', closeModal);
overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'ArrowLeft')  goToSlide(currentSlide - 1);
  if (e.key === 'ArrowRight') goToSlide(currentSlide + 1);
});

// ── Custom Pin Icon ──
function makePinIcon(type) {
  const color = PIN_COLORS[type] || PIN_COLORS.been;
  return L.divIcon({
    className: '',
    html: `<div class="memory-pin"><div class="pin-outer" style="--pin-color:${color}"><div class="pin-inner"></div></div></div>`,
    iconSize: [28, 36],
    iconAnchor: [14, 34],
    popupAnchor: [0, -36]
  });
}

// ── Place Pins ──
memories.forEach(memory => {
  const marker = L.marker([memory.lat, memory.lng], { icon: makePinIcon(memory.type) });
  marker.addTo(map);
  marker.on('click', () => openModal(memory));
});

document.getElementById('pin-count').textContent = memories.filter(m => m.type === 'been').length;
</script>
